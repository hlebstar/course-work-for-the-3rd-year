<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GlampTime Admin - Панель управления</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #0a0f0a;
            color: #fff;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        /* Бургер-кнопка */
        .burger-btn {
            display: none;
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1001;
            background: #ffd700;
            border: none;
            border-radius: 8px;
            padding: 10px 12px;
            cursor: pointer;
            font-size: 20px;
            color: #0a0f0a;
            transition: 0.3s;
        }

        .burger-btn:hover {
            background: #e6c200;
        }

        .admin-sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: linear-gradient(135deg, #0a1a0a 0%, #0d2618 100%);
            border-right: 1px solid rgba(255,215,0,0.2);
            padding: 2rem 1rem;
            overflow-y: auto;
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        @media (max-width: 768px) {
            .burger-btn {
                display: block;
            }

            .admin-sidebar {
                transform: translateX(-100%);
                box-shadow: 10px 0 30px rgba(0,0,0,0.5);
                width: 280px;
            }

            .admin-sidebar.open {
                transform: translateX(0);
            }
        }

        .admin-logo {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,215,0,0.3);
        }

        .admin-logo h2 {
            font-size: 1.5rem;
            color: #ffd700;
        }

        .admin-logo p {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
        }

        .admin-menu {
            list-style: none;
            padding: 0;
        }

        .admin-menu li {
            margin-bottom: 0.5rem;
        }

        .admin-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s;
        }

        .admin-menu a i {
            width: 24px;
            font-size: 1.2rem;
        }

        .admin-menu a:hover, .admin-menu a.active {
            background: rgba(255,215,0,0.15);
            color: #ffd700;
        }

        .admin-content {
            margin-left: 280px;
            padding: 2rem;
            min-height: 100vh;
            transition: margin-left 0.3s ease;
        }

        @media (max-width: 768px) {
            .admin-content {
                margin-left: 0;
                padding: 1rem;
                padding-top: 70px;
            }
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,215,0,0.2);
        }

        @media (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 300;
        }

        @media (max-width: 768px) {
            .page-title {
                font-size: 1.4rem;
            }
        }

        .admin-user {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(255,255,255,0.05);
            padding: 0.5rem 1rem;
            border-radius: 12px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        .stat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #ffd700;
            background: rgba(255,215,0,0.05);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            background: rgba(255,215,0,0.1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #ffd700;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 992px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }

        .chart-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 20px;
            padding: 1.5rem;
        }

        .chart-title {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: #ffd700;
        }

        canvas {
            max-height: 300px;
        }

        .data-table {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 20px;
            overflow: hidden;
            overflow-x: auto;
        }

        .data-table table {
            width: 100%;
            color: #fff;
            min-width: 600px;
        }

        .data-table th {
            padding: 1rem;
            background: rgba(255,215,0,0.1);
            text-align: left;
            font-weight: 500;
        }

        .data-table td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .data-table tr:hover {
            background: rgba(255,215,0,0.05);
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .badge-pending { background: #ffc107; color: #000; }
        .badge-confirmed { background: #28a745; color: #fff; }
        .badge-cancelled { background: #dc3545; color: #fff; }

        .btn-action {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            margin: 0 3px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
        }

        .btn-edit {
            background: #ffc107;
            color: #000;
        }

        .btn-delete {
            background: #dc3545;
            color: #fff;
        }

        .btn-view {
            background: #17a2b8;
            color: #fff;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1001;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a2a1a, #0d2618);
            border-radius: 20px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,215,0,0.2);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: rgba(255,255,255,0.8);
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 10px;
            color: #fff;
        }

        .toast-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #28a745;
            color: #fff;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            z-index: 1100;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            backdrop-filter: blur(2px);
        }

        @media (max-width: 768px) {
            .sidebar-overlay.active {
                display: block;
            }
        }
    </style>
</head>
<body>

    <button class="burger-btn" id="burgerBtn">
        <i class="fas fa-bars"></i>
    </button>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="admin-sidebar" id="sidebar">
        <div class="admin-logo">
            <h2><i class="fas fa-crown"></i> GlampTime</h2>
            <p>Административная панель</p>
        </div>
        <ul class="admin-menu">
            <li><a href="#" data-tab="dashboard" class="active"><i class="fas fa-tachometer-alt"></i> Дашборд</a></li>
            <li><a href="#" data-tab="glamps"><i class="fas fa-home"></i> Домики</a></li>
            <li><a href="#" data-tab="bookings"><i class="fas fa-calendar-check"></i> Бронирования</a></li>
            <li><a href="#" data-tab="users"><i class="fas fa-users"></i> Пользователи</a></li>
            <li><a href="#" data-tab="settings"><i class="fas fa-cog"></i> Настройки</a></li>
            <li><a href="#" data-tab="reviews"><i class="fas fa-star"></i> Отзывы</a></li>
            <li><a href="/"><i class="fas fa-sign-out-alt"></i> Выход</a></li>
        </ul>
    </div>

    <div class="admin-content">
        <div class="admin-header">
            <h1 class="page-title" id="pageTitle">Панель управления</h1>
            <div class="admin-user">
                <i class="fas fa-user-circle"></i>
                <span>Администратор</span>
            </div>
        </div>

        <div id="dashboardTab" class="tab-content fade-in">
            <div class="stats-grid" id="statsGrid"></div>
            <div class="charts-grid">
                <div class="chart-card">
                    <div class="chart-title"><i class="fas fa-chart-line"></i> Бронирования по месяцам</div>
                    <canvas id="bookingsChart"></canvas>
                </div>
                <div class="chart-card">
                    <div class="chart-title"><i class="fas fa-chart-pie"></i> Популярность домиков</div>
                    <canvas id="popularityChart"></canvas>
                </div>
            </div>
            <div class="data-table">
                <h4 style="padding: 1rem; margin: 0;">Последние бронирования</h4>
                <div id="recentBookings"></div>
            </div>
        </div>

        <div id="glampsTab" class="tab-content fade-in" style="display: none;">
            <div style="margin-bottom: 1rem; text-align: right;">
                <button class="btn-action btn-edit" onclick="openGlampModal()"><i class="fas fa-plus"></i> Добавить домик</button>
            </div>
            <div class="data-table">
                <div id="glampsTable"></div>
            </div>
        </div>

        <div id="bookingsTab" class="tab-content fade-in" style="display: none;">
            <div class="data-table">
                <div id="bookingsTable"></div>
            </div>
        </div>

        <div id="usersTab" class="tab-content fade-in" style="display: none;">
            <div class="data-table">
                <div id="usersTable"></div>
            </div>
        </div>

        <div id="settingsTab" class="tab-content fade-in" style="display: none;">
            <div class="data-table" style="padding: 2rem;">
                <h3>Настройки системы</h3>
                <div class="form-group">
                    <label>Название сайта</label>
                    <input type="text" id="siteName" value="GlampTime">
                </div>
                <div class="form-group">
                    <label>Email для уведомлений</label>
                    <input type="email" id="adminEmail" value="admin@glamptime.ru">
                </div>
                <div class="form-group">
                    <label>Телефон</label>
                    <input type="text" id="adminPhone" value="+7 (123) 456-78-90">
                </div>
                <button class="btn-action btn-edit" onclick="saveSettings()">Сохранить настройки</button>
            </div>
        </div>

        <div id="reviewsTab" class="tab-content fade-in" style="display: none;">
            <div class="data-table">
                <div id="reviewsTable"></div>
            </div>
        </div>
    </div>

    <div id="glampModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Добавить домик</h3>
                <button class="btn-action btn-delete" onclick="closeModal()">✕</button>
            </div>
            <form id="glampForm">
                <input type="hidden" id="glampId">
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" id="glampName" required>
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="glampDescription" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>Цена за ночь (₽)</label>
                    <input type="number" id="glampPrice" required>
                </div>
                <div class="form-group">
                    <label>Макс. гостей</label>
                    <input type="number" id="glampMaxGuests" required>
                </div>
                <div class="form-group">
                    <label>Удобства (через запятую)</label>
                    <input type="text" id="glampAmenities" placeholder="WiFi, Парковка, Кухня">
                </div>
                <div class="form-group">
                    <label>Город</label>
                    <input type="text" id="glampCity" required>
                </div>
                <div class="form-group">
                    <label>Адрес</label>
                    <input type="text" id="glampAddress" required>
                </div>
                <div class="form-group">
                    <label>Тип</label>
                    <select id="glampType">
                        <option value="house">Домик</option>
                        <option value="tent">Шатер</option>
                        <option value="lodge">Лодж</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>URL фото</label>
                    <input type="text" id="glampImage" placeholder="https://...">
                </div>
                <button type="submit" class="btn-action btn-edit" style="width: 100%;">Сохранить</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/admin2.js"></script>
    
    <script>
        const burgerBtn = document.getElementById('burgerBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');

        function openSidebar() {
            sidebar.classList.add('open');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        burgerBtn.addEventListener('click', openSidebar);
        overlay.addEventListener('click', closeSidebar);

        const menuLinks = document.querySelectorAll('.admin-menu a');
        menuLinks.forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth <= 768) {
                    closeSidebar();
                }
            });
        });

        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                closeSidebar();
            }
        });
    </script>
</body>
</html>
