<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GlampTime - Бронирование домика</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --forest-dark: #0a0f0a;
            --accent-gold: #ffd700;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --danger: #dc3545;
            --success: #28a745;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--forest-dark);
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        .top-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(10, 15, 10, 0.95);
            border-bottom: 1px solid rgba(255,215,0,0.2);
        }

        .logo {
            color: white;
            font-size: 22px;
            font-weight: 300;
            text-decoration: none;
            letter-spacing: 0.5px;
        }

        .logo i {
            margin-left: 5px;
            font-size: 18px;
        }

        .burger-menu {
            display: none;
            flex-direction: column;
            cursor: pointer;
            z-index: 20;
        }

        .burger-menu span {
            width: 25px;
            height: 3px;
            background: white;
            margin: 3px 0;
            transition: 0.3s;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 35px;
            margin: 0;
            padding: 0;
            transition: 0.3s;
        }

        .nav-menu a {
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            font-size: 15px;
            font-weight: 400;
            transition: color 0.3s;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            color: white;
        }

        .detail-hero {
            background: linear-gradient(rgba(2, 114, 15, 0.5), rgba(8, 36, 1, 0.7));
            padding: 6rem 0 3rem;
            margin-top: 80px;
        }

        .glamp-main-image {
            width: 100%;
            height: 450px;
            object-fit: cover;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .gallery-img {
            width: 100%;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid var(--glass-border);
        }

        .gallery-img:hover {
            transform: scale(1.05);
            border-color: var(--accent-gold);
        }

        .detail-content {
            padding: 3rem 0;
        }

        .glamp-title {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 1rem;
            color: var(--accent-gold);
        }

        .glamp-location {
            color: rgba(255,255,255,0.6);
            margin-bottom: 1.5rem;
        }

        .glamp-description {
            line-height: 1.8;
            color: rgba(255,255,255,0.8);
            margin-bottom: 2rem;
        }

        .features-list {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .feature-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 0.8rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .feature-item i {
            color: var(--accent-gold);
            font-size: 1.2rem;
        }

        /* Боковая панель с информацией */
        .booking-sidebar {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            position: sticky;
            top: 100px;
        }

        .price-large {
            font-size: 2rem;
            color: var(--accent-gold);
            margin-bottom: 1rem;
            text-align: center;
        }

        .price-large small {
            font-size: 1rem;
            color: rgba(255,255,255,0.6);
        }

        .booking-info-detail {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 1rem;
            margin: 1rem 0;
        }

        .date-info {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            padding: 0.8rem;
            border-radius: 10px;
            margin-bottom: 0.5rem;
        }

        .total-price-display {
            background: rgba(0,0,0,0.5);
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
            margin: 1rem 0;
        }

        .total-price-display .total-amount {
            font-size: 1.5rem;
            color: var(--accent-gold);
            font-weight: bold;
        }

        .btn-continue {
            background: linear-gradient(135deg, #1a472a, #0d2618);
            color: var(--accent-gold);
            border: 1px solid var(--glass-border);
            padding: 1rem;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
            margin-top: 1rem;
            cursor: pointer;
        }

        .btn-continue:hover {
            background: linear-gradient(135deg, #245d38, #1a472a);
            color: white;
            border-color: var(--accent-gold);
        }

        .btn-back {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-back:hover {
            background: rgba(255,255,255,0.1);
            color: var(--accent-gold);
        }

        .warning-message {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid var(--danger);
            border-radius: 10px;
            padding: 0.8rem;
            margin-bottom: 1rem;
            color: #ff6b6b;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .top-header {
                padding: 15px 5%;
            }
            
            .burger-menu {
                display: flex;
            }
            
            .nav-menu {
                position: fixed;
                top: 0;
                right: -100%;
                width: 280px;
                height: 100vh;
                background: rgba(10, 15, 10, 0.98);
                backdrop-filter: blur(10px);
                flex-direction: column;
                padding: 80px 30px;
                gap: 25px;
                z-index: 15;
            }
            
            .nav-menu.active {
                right: 0;
            }
            
            .nav-menu a {
                font-size: 18px;
            }
            
            .detail-hero {
                margin-top: 70px;
                padding: 4rem 0 2rem;
            }
            
            .glamp-main-image {
                height: 300px;
            }
            
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .glamp-title {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 480px) {
            .glamp-main-image {
                height: 250px;
            }
        }
    </style>
</head>
<body>

    <header class="top-header">
        <a class="logo" href="/">GlampTime <i class="fa-regular fa-clock"></i></a>
        
        <div class="burger-menu" id="burgerMenu">
            <span></span>
            <span></span>
            <span></span>
        </div>
        
        <ul class="nav-menu" id="navMenu">
            <li><a href="/services.html">Услуги</a></li>
            <li><a href="/glamps.html">Проживание</a></li>
            <li><a href="/rasvlichenia.html">Развлечения</a></li>
            <li><a href="/contact.html">Контакты</a></li>
        </ul>
    </header>

    <section class="detail-hero">
        <div class="container">
            <div class="row">
                <div class="col-lg-8">
                    <img src="" alt="Главное фото" class="glamp-main-image" id="mainImage">
                    <div class="gallery-grid" id="galleryGrid"></div>
                </div>
                
                <div class="col-lg-4">
                    <div class="booking-sidebar">
                        <div class="price-large" id="glampPrice">
                            0 ₽ <small>/ночь</small>
                        </div>
                        <div id="bookingInfoDetail"></div>
                        <button class="btn-continue" id="continueBookingBtn">
                            <i class="fas fa-arrow-right"></i> Продолжить бронирование
                        </button>
                        <a href="/glamps.html" class="btn-back mt-3 d-block text-center">
                            <i class="fas fa-arrow-left"></i> Назад к домикам
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="detail-content">
        <div class="container">
            <div class="row">
                <div class="col-lg-8">
                    <h1 class="glamp-title" id="glampTitle">Шале у леса</h1>
                    <div class="glamp-location" id="glampLocation">
                        <i class="fas fa-map-marker-alt"></i> Сочи, ул. Лесная
                    </div>
                    <div class="features-list" id="featuresList"></div>
                    <div class="glamp-description" id="glampDescription"></div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/glamp-detail2.js"></script>
    <script>
        const burgerMenu = document.getElementById('burgerMenu');
        const navMenu = document.getElementById('navMenu');
        
        if (burgerMenu) {
            burgerMenu.addEventListener('click', function() {
                navMenu.classList.toggle('active');
                burgerMenu.classList.toggle('active');
                
                const spans = burgerMenu.querySelectorAll('span');
                if (burgerMenu.classList.contains('active')) {
                    spans[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
                    spans[1].style.opacity = '0';
                    spans[2].style.transform = 'rotate(-45deg) translate(7px, -6px)';
                    document.body.style.overflow = 'hidden';
                } else {
                    spans[0].style.transform = 'none';
                    spans[1].style.opacity = '1';
                    spans[2].style.transform = 'none';
                    document.body.style.overflow = '';
                }
            });
        }
        
        document.querySelectorAll('.nav-menu a').forEach(link => {
            link.addEventListener('click', () => {
                navMenu.classList.remove('active');
                if (burgerMenu) burgerMenu.classList.remove('active');
                const spans = burgerMenu.querySelectorAll('span');
                spans[0].style.transform = 'none';
                spans[1].style.opacity = '1';
                spans[2].style.transform = 'none';
                document.body.style.overflow = '';
            });
        });
        
        // Закрытие при клике вне меню
        document.addEventListener('click', function(event) {
            if (navMenu.classList.contains('active')) {
                if (!burgerMenu.contains(event.target) && !navMenu.contains(event.target)) {
                    navMenu.classList.remove('active');
                    burgerMenu.classList.remove('active');
                    const spans = burgerMenu.querySelectorAll('span');
                    spans[0].style.transform = 'none';
                    spans[1].style.opacity = '1';
                    spans[2].style.transform = 'none';
                    document.body.style.overflow = '';
                }
            }
        });
    </script>
</body>
</html>
