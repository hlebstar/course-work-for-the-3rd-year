<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Вход в админ-панель - GlampTime</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Фоновое изображение на весь экран */
        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('/images/photo_2026-04-07_15-18-07.jpg') center/cover no-repeat;
            z-index: -2;
        }

        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }

        .login-card {
            background: rgba(52, 65, 50, 0.479);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(239, 245, 239, 0.2);
            border-radius: 30px;
            padding: 2rem;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo i {
            font-size: 2rem;
            color: #a8d8a8;
        }

        .login-logo h2 {
            font-size: 1.8rem;
            color: #eff5ef;
            font-weight: 600;
        }

        .login-logo p {
            font-size: 0.8rem;
            color: rgba(239, 245, 239, 0.5);
            margin-top: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #eff5ef;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(239, 245, 239, 0.2);
            border-radius: 12px;
            color: #eff5ef;
            transition: 0.3s;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #7F9373;
            background: rgba(255,255,255,0.05);
        }

        .form-group input::placeholder {
            color: rgba(239, 245, 239, 0.4);
        }

        .btn-login {
            width: 100%;
            padding: 0.8rem;
            background: #7F9373;
            border: none;
            border-radius: 50px;
            color: #eff5ef;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #45573a;
            transform: translateY(-2px);
        }

        .error-message {
            background: rgba(220,53,69,0.2);
            border: 1px solid #dc3545;
            border-radius: 12px;
            padding: 0.8rem;
            margin-bottom: 1rem;
            color: #ff6b6b;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }

        .demo-info {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(239, 245, 239, 0.1);
            text-align: center;
            font-size: 0.75rem;
            color: rgba(239, 245, 239, 0.4);
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 1rem;
            }
            
            .login-card {
                padding: 1.5rem;
            }
            
            .login-logo h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="background-image"></div>
    <div class="background-overlay"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <h2>GlampTime Admin</h2>
                <p>Вход в панель управления</p>
            </div>

            <div id="errorMessage" class="error-message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label> Логин</label>
                    <input type="text" id="username" placeholder="admin" required>
                </div>
                <div class="form-group">
                    <label> Пароль</label>
                    <input type="password" id="password" placeholder="********" required>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Войти
                </button>
            </form>

    
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            errorDiv.style.display = 'none';
            
            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    window.location.href = '/admin.html';
                } else {
                    errorDiv.textContent = result.error || 'Ошибка входа';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Ошибка соединения с сервером';
                errorDiv.style.display = 'block';
            }
        });
        
        async function checkAuth() {
            try {
                const response = await fetch('/api/admin/check');
                const result = await response.json();
                if (result.authenticated) {
                    window.location.href = '/admin.html';
                }
            } catch (error) {}
        }
        checkAuth();
    </script>
</body>
</html>
